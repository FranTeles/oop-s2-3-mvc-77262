name: ci

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-test-and-report:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: "8.0.x"
      TEST_PROJECT: "tests/VgcCollege.Tests/VgcCollege.Tests.csproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=./TestResults/coverage.xml

      - name: Install ReportGenerator tool
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: |
          reportgenerator \
          -reports:${{ env.TEST_PROJECT }}/TestResults/coverage.xml \
          -targetdir:coveragereport \
          -reporttypes:Html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coveragereport

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
